[pytest]
# pytest 設定檔

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 顯示的輸出級別
log_cli = false
log_level = INFO

# 最大冗長度
addopts = -v --strict-markers --tb=short

# 測試覆蓋率配置
# addopts = --cov=starlib --cov-report=html

# 異常程式碼
markers =
    unit: Unit tests (small, isolated components)
    integration: Integration tests (multiple components)
    e2e: End-to-end tests (full workflows)
    slow: Tests marked as slow (deselect with '-m "not slow"')
    db: Tests involving database operations
    external_api: Tests involving external API calls
    async: Asynchronous tests
